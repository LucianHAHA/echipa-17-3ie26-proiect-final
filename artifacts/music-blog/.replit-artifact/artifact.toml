kind = "web"
previewPath = "/"
title = "Purple Rain Music Blog"
version = "1.0.0"
id = "artifacts/music-blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21702

[services.development]
run = "pnpm --filter @workspace/music-blog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-blog", "run", "build" ]
publicDir = "artifacts/music-blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21702"
BASE_PATH = "/"
